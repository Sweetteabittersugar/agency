name: Feature Request
description: 建议一个新功能
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个功能解决什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议的方案
      description: 你期望的功能是什么样的？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
