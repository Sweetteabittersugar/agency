name: Bug Report
description: 报告一个 bug
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: 描述
      description: bug 的具体表现
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何触发这个 bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 正常情况应该怎样
  - type: input
    id: version
    attributes:
      label: 版本
      description: Agency 版本号
      placeholder: "0.1.0"
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - macOS
        - Linux
