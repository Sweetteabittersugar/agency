<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agency</title>
<style>
/* 暗色聊天风格 */
:root{--bg:#1a1a2e;--surface:#16213e;--text:#e0e0e0;--muted:#888;--primary:#6C5CE7;--accent:#00B894;--danger:#FF6B6B;--border:#2a2a4a}
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.6 system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex}
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:16px 16px 8px}
.sidebar-list{flex:1;overflow-y:auto;padding:4px 8px}
.sidebar-item{padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:2px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s}
.sidebar-item:hover{background:rgba(255,255,255,.05)}
.sidebar-item .time{font-size:10px;color:var(--muted)}
.new-chat-btn{margin:8px 12px;padding:8px 12px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.main{flex:1;display:flex;flex-direction:column;max-width:900px;margin:0 auto;width:100%}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border)}
.header h1{font-size:18px;color:var(--primary)}
.messages{flex:1;overflow-y:auto;padding:16px 20px}
.msg{padding:12px 16px;border-radius:8px;margin-bottom:12px;max-width:85%}
.msg.user{background:var(--primary);color:#fff;margin-left:auto}
.msg.assistant{background:var(--surface);border:1px solid var(--border)}
.msg .label{font-size:11px;color:var(--muted);margin-bottom:4px}
.msg .label .agent-name{color:var(--accent)}
.msg pre{background:#0d1117;color:#7ee787;padding:12px;border-radius:6px;overflow-x:auto;margin:8px 0;font:13px 'Cascadia Code',monospace}
.msg code{font:13px 'Cascadia Code',monospace;background:rgba(255,255,255,.1);padding:2px 6px;border-radius:3px}
.msg pre code{background:none;padding:0}
.bottom-bar{display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--border)}
.bottom-bar input{flex:1;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none}
.bottom-bar input:focus{border-color:var(--primary)}
.bottom-bar button{padding:12px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;white-space:nowrap}
.bottom-bar button.stopping{background:var(--danger);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.empty-state{text-align:center;color:var(--muted);margin-top:100px}
.empty-state h2{font-size:24px;margin-bottom:8px;color:var(--primary)}
.empty-state p{font-size:14px}
.route-badge{font-size:12px;color:var(--muted);padding:4px 0}
.route-badge span{background:var(--surface);padding:2px 8px;border-radius:4px;margin-right:6px}
.cursor{display:inline-block;width:8px;height:16px;background:var(--accent);animation:blink .6s infinite;vertical-align:middle;margin-left:2px}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <h3>历史对话</h3>
  <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
  <div class="sidebar-list" id="history-list"></div>
</div>

<div class="main">
  <div class="header"><h1>Agency</h1><span style="font-size:12px;color:var(--muted)">按 ? 看快捷键</span></div>

  <div class="messages" id="messages">
    <div class="empty-state">
      <h2>Agency</h2>
      <p>24 个 Agent 就绪。直接说任务，或 @agent名 指定。</p>
    </div>
  </div>

  <div class="route-badge" id="route-badge"></div>

  <div class="bottom-bar">
    <input id="input" placeholder="输入任务，或 @agent名 指定Agent..." autofocus>
    <button id="send-btn" onclick="handleSend()">发送</button>
  </div>
</div>

<script>
// ── State ──
let isStreaming = false;
let abortController = null;
let conversations = JSON.parse(localStorage.getItem('agency_convos') || '[]');
let currentConvo = { id: Date.now(), title: '', messages: [] };
let currentAssistantMsg = null;

// ── DOM ──
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const routeBadge = document.getElementById('route-badge');
const historyList = document.getElementById('history-list');
const emptyState = document.querySelector('.empty-state');

// ── Shortcuts ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isStreaming) { stopStream(); return; }
  if (e.key === '?' && document.activeElement !== inputEl) {
    alert('快捷键:\nEnter 发送 | Esc 停止\n@agent名 指定Agent\nShift+Enter 换行');
  }
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

// ── Send ──
async function handleSend() {
  if (isStreaming) { stopStream(); return; }
  const task = inputEl.value.trim();
  if (!task) return;

  // Extract @agent
  let forceAgent = '';
  let actualTask = task;
  const m = task.match(/^@(\S+)\s+/);
  if (m) { forceAgent = m[1]; actualTask = task.slice(m[0].length); }

  // UI: sending state
  isStreaming = true;
  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.textContent = '停止';
  sendBtn.classList.add('stopping');
  routeBadge.innerHTML = '路由中...';
  if (emptyState) emptyState.style.display = 'none';

  // User msg
  addMessage('user', task);

  // Assistant msg placeholder
  currentAssistantMsg = addMessage('assistant', '');
  currentAssistantMsg.innerHTML = '<span class="cursor"></span>';

  abortController = new AbortController();

  try {
    // Route
    const rResp = await fetch('/api/route', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({task: actualTask, force_agent: forceAgent}),
      signal: abortController.signal
    });
    const route = await rResp.json();
    if (route.error) throw new Error(route.error);

    routeBadge.innerHTML = `<span>Agent: ${route.agent}</span><span>${route.model}</span>`;
    currentAssistantMsg.querySelector('.cursor')?.remove();

    // Stream
    const body = forceAgent
      ? JSON.stringify({task: actualTask, force_agent: forceAgent, model: route.model})
      : JSON.stringify({task: actualTask, model: route.model});

    const resp = await fetch('/api/chat', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body, signal: abortController.signal
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let rawText = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('event: done')) continue;
        if (line.startsWith('event: meta')) continue;
        if (line.startsWith('data: ')) {
          try {
            const d = JSON.parse(line.slice(6));
            if (d.content) {
              rawText += d.content;
              currentAssistantMsg.innerHTML = renderMD(rawText) + '<span class="cursor"></span>';
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (d.elapsed) {
              routeBadge.innerHTML += `<span>${d.elapsed}s · $${d.cost}</span>`;
            }
          } catch(e) {}
        }
      }
    }
    currentAssistantMsg.querySelector('.cursor')?.remove();

  } catch (e) {
    if (e.name === 'AbortError') {
      if (currentAssistantMsg) currentAssistantMsg.innerHTML += '<br>[已停止]';
    } else {
      if (currentAssistantMsg) currentAssistantMsg.innerHTML = `<span style="color:var(--danger)">错误: ${escHtml(e.message)}</span>`;
    }
  } finally {
    resetUI();
  }
}

function stopStream() {
  if (abortController) { abortController.abort(); abortController = null; }
}

function resetUI() {
  isStreaming = false;
  abortController = null;
  inputEl.disabled = false;
  sendBtn.textContent = '发送';
  sendBtn.classList.remove('stopping');
  inputEl.focus();
}

// ── Messages ──
function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = content;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

// ── Markdown ──
function renderMD(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

// ── History ──
function newChat() {
  currentConvo = { id: Date.now(), title: '', messages: [] };
  messagesEl.innerHTML = '<div class="empty-state"><h2>Agency</h2><p>24个Agent就绪。直接说任务。</p></div>';
  routeBadge.innerHTML = '';
}
function renderHistory() {
  historyList.innerHTML = conversations.map(c =>
    `<div class="sidebar-item" onclick="loadConvo('${c.id}')"><div>${escHtml(c.title || '新对话')}</div><div class="time">${new Date(c.id).toLocaleDateString()}</div></div>`
  ).join('');
}
renderHistory();

// ── Init ──
inputEl.focus();
</script>
</body>
</html>
