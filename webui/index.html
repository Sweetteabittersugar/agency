<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
:root{--bg:#080c14;--surface:#0f1520;--surface2:#161d2b;--text:#e6e8ed;--text2:#9ca3b4;--muted:#5f6877;--accent:#22d3a0;--danger:#f87171;--warn:#fbbf20;--border:#1e293b;--radius:10px;--radius-sm:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.55 "DM Sans","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
.sidebar{width:280px;min-width:280px;background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border)}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.sidebar-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sidebar-panel{flex:1;overflow-y:auto;display:none;padding:8px}
.sidebar-panel.active{display:flex;flex-direction:column}
/* 全局隐藏侧边栏所有滚动条 — 保留滚轮 */
.sidebar *{scrollbar-width:none;-ms-overflow-style:none}
.sidebar *::-webkit-scrollbar{display:none}
.agent-card{background:var(--surface2);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.agent-card:hover{border-color:var(--accent);background:rgba(34,211,160,.06)}
.agent-card .name{font-weight:600;font-size:13px;color:#fff}
.agent-card .model{font-size:10px;background:var(--accent);color:#000;padding:1px 6px;border-radius:4px;margin-left:6px}
.agent-card .desc{font-size:11px;color:var(--text2);margin-top:3px}
.agent-card .kw{font-size:10px;color:var(--muted);margin-top:2px;opacity:.7}
.new-chat-btn{width:100%;padding:8px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;margin-bottom:8px;flex-shrink:0;font-weight:600}
.history-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px;margin-bottom:2px;transition:background .15s;position:relative}
.history-item:hover{background:rgba(255,255,255,.04)}
.history-item:hover .del-btn{opacity:1}
.history-item .time{font-size:10px;color:var(--muted)}
.history-item .preview{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.del-btn{opacity:0;background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;transition:opacity .15s;position:absolute;right:6px;top:50%;transform:translateY(-50%)}
.del-btn:hover{color:#f00}
.agent-search{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none;margin-bottom:8px;flex-shrink:0}
.agent-search:focus{border-color:var(--accent)}
.agent-list{flex:1;overflow-y:auto}
.proj-label{font-size:12px;color:var(--text);display:block;margin-bottom:4px;font-weight:600}
.proj-hint{font-size:10px;color:var(--muted);margin-bottom:8px}
.proj-input{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;outline:none;font-family:"JetBrains Mono",monospace;margin-bottom:8px}
.proj-input:focus{border-color:var(--accent)}
.proj-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.proj-btn:hover{border-color:var(--danger);color:var(--danger)}

.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.header h1{font-size:15px;color:var(--accent);display:flex;align-items:center;gap:8px}
.header h1 .dot{width:7px;height:7px;background:var(--accent);border-radius:50%}
.header-actions{display:flex;gap:5px;align-items:center}
.page-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:4px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;font-size:11px;color:var(--muted)}
.page-bar button{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.page-bar button:hover{border-color:var(--accent)}
.page-bar button:disabled{opacity:.3}
.grid{flex:1;display:grid;gap:0;overflow:hidden;min-height:0}
.grid.g1{grid-template-columns:1fr}
.grid.g2{grid-template-columns:1fr 1fr}
.grid.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.panel{display:none;flex-direction:column;overflow:hidden;min-height:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.panel.on{display:flex}
.panel:nth-child(even){border-right:none}
.panel-bar{display:flex;align-items:center;justify-content:space-between;padding:2px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;cursor:grab}
.panel-bar .pinfo{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.panel-bar .pdot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.panel-bar .pdot.busy{background:var(--warn);animation:pulse 1s infinite}
.panel-bar .pclose{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 2px;line-height:1}
.panel-bar .pclose:hover{color:var(--danger)}
.panel-msgs{flex:1;overflow-y:auto;padding:8px 10px;min-height:0}
.panel-route{padding:2px 8px;font-size:9px;color:var(--muted);flex-shrink:0;display:flex;gap:4px;flex-wrap:wrap;background:var(--surface);min-height:18px}
.panel-route span{background:var(--surface2);padding:1px 5px;border-radius:3px;white-space:nowrap}
.panel-inp{display:flex;gap:5px;padding:6px 8px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.panel-inp textarea{flex:1;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;outline:none;resize:none;min-height:34px;max-height:100px;font-family:inherit;line-height:1.4}
.panel-inp textarea:focus{border-color:var(--accent)}
.panel-inp button{padding:6px 12px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;align-self:flex-end;min-width:48px}
.panel-inp button.stopping{background:var(--danger);color:#fff;animation:pulse 1s infinite}
.panel.dragging{opacity:.35}
.panel.drag-over{box-shadow:inset 0 0 0 2px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.msg{max-width:88%;margin-bottom:7px;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0;transform:translateY(2px)}}
.msg.user{margin-left:auto}
.msg.user .bubble{background:var(--accent);color:#000;border-radius:var(--radius) var(--radius) 3px var(--radius);padding:6px 9px;font-size:12px}
.msg.assistant .bubble{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius) var(--radius) var(--radius) 3px;padding:6px 9px;font-size:12px}
.msg-label{font-size:9px;color:var(--muted);margin-bottom:2px;padding:0 2px}
.msg.user .msg-label{text-align:right}
.msg pre{background:#0d1117;color:#7ee787;padding:8px 10px;border-radius:5px;overflow-x:auto;margin:4px 0;font:11px "JetBrains Mono",monospace}
.msg code{font:11px "JetBrains Mono",monospace;background:rgba(255,255,255,.08);padding:1px 3px;border-radius:2px}
.msg pre code{background:none;padding:0}
.cursor{display:inline-block;width:6px;height:13px;background:var(--accent);animation:blink .5s infinite;vertical-align:text-bottom;margin-left:1px;border-radius:1px}
@keyframes blink{50%{opacity:0}}
.empty-panel{text-align:center;color:var(--muted);margin-top:3vh}
.empty-panel .logo{font-size:22px;margin-bottom:3px}
.empty-panel h3{font-size:12px;margin-bottom:2px;color:#fff}
.toast{position:fixed;top:12px;right:12px;background:var(--surface2);border:1px solid var(--border);padding:8px 14px;border-radius:var(--radius);font-size:12px;z-index:99;animation:fadeIn .2s;max-width:340px}
.toast.error{border-color:var(--danger)}
.toast.warn{border-color:var(--warn)}
.toast-acts{display:flex;gap:4px;margin-top:6px}
.toast-acts button{padding:3px 10px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-weight:600}
.toast-acts .allow{background:var(--accent);color:#000}
.toast-acts .deny{background:var(--danger);color:#fff}
.toast-acts .always{background:var(--surface);border:1px solid var(--accent);color:var(--accent)}
.ctx-gauge{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:4px}
.ctx-gauge-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s}
.ctx-gauge-fill.warn{background:var(--warn)}
.ctx-gauge-fill.danger{background:var(--danger)}
.perm-item{padding:4px 6px;margin-bottom:2px;border-radius:4px;border-left:2px solid transparent;font-size:10px}
.perm-item.allow{border-left-color:var(--accent)}
.perm-item.deny{border-left-color:var(--danger)}
.perm-item.block{border-left-color:var(--warn)}
.perm-item .pdec{font-weight:600}
.harness-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:50;display:none;flex-direction:column}
.harness-overlay.on{display:flex}
.harness-overlay.mini{position:fixed;top:80px;left:300px;right:auto;bottom:auto;width:480px;height:360px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:100;resize:both;overflow:hidden;min-width:320px;min-height:240px}
.harness-overlay.mini .harness-overlay-tabs{cursor:move;font-size:10px}
.harness-overlay.mini .harness-overlay-tab{padding:6px 10px;font-size:10px}
.harness-overlay.mini .harness-overlay-content{padding:8px}
.resize-handle{position:absolute;bottom:0;right:0;width:16px;height:16px;cursor:nwse-resize;background:linear-gradient(135deg,transparent 50%,var(--border) 50%);border-radius:0 0 var(--radius) 0;display:none}
.harness-overlay.mini .resize-handle{display:block}
.harness-overlay-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 12px;flex-shrink:0}
.harness-overlay-tab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.harness-overlay-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.harness-overlay-content{flex:1;overflow-y:auto;padding:14px}
.mem-file{cursor:pointer;padding:6px 8px;border-radius:4px;font-size:11px;display:flex;align-items:center;gap:6px;transition:background .15s}
.mem-file:hover{background:rgba(255,255,255,.04)}
.mem-file .icon{font-size:14px}
.mem-editor{width:100%;min-height:200px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;padding:10px;font-family:"JetBrains Mono",monospace;outline:none;resize:vertical}
.settings-section{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.settings-section:last-child{border-bottom:none;margin-bottom:0}
.btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:5px;cursor:pointer;font-size:11px;white-space:nowrap;transition:all .15s}
.btn:hover{border-color:var(--accent)}
.btn.on{background:var(--accent);border-color:var(--accent);color:#000}
.tools-section{margin-bottom:12px}
.tools-section h3{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.tools-section textarea{width:100%;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:11px;outline:none;resize:vertical;min-height:40px;font-family:inherit}
.tools-section textarea:focus{border-color:var(--accent)}
.cost-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;color:var(--muted)}
.cost-row .val{color:var(--text);font-weight:500}
.cost-bar{height:3px;background:var(--border);border-radius:2px;margin:2px 0 6px;overflow:hidden}
.cost-bar-fill{height:100%;background:var(--accent);border-radius:2px}
.cost-kpis{display:flex;gap:6px;margin-bottom:8px}
.cost-kpi{flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:6px;text-align:center}
.kpi-val{display:block;font-size:14px;font-weight:700;color:var(--accent)}
.kpi-label{display:block;font-size:9px;color:var(--muted);margin-top:1px}
</style>
</head>
<body>
<nav class="sidebar">
<div class="sidebar-tabs">
<div class="sidebar-tab active" data-tab="agents">Agent</div>
<div class="sidebar-tab" data-tab="project">项目</div>
<div class="sidebar-tab" data-tab="history">历史</div>
</div>
<div class="sidebar-panel active" id="panel-agents">
<input class="agent-search" id="agent-search" placeholder="搜索 Agent…" autocomplete="off">
<div class="agent-list" id="agent-list"></div>
</div>
<div class="sidebar-panel" id="panel-project">
<div style="padding:4px 0">
<label class="proj-label">📁 工作目录</label>
<p class="proj-hint">Agent 在此目录下工作</p>
<input class="proj-input" id="proj-dir" placeholder="例: D:\ai">
<div style="margin-top:6px"><button class="proj-btn" onclick="projDir='';document.getElementById('proj-dir').value='';localStorage.removeItem('agency_proj_dir')">清除</button></div>
</div>
</div>
<div class="sidebar-panel" id="panel-history">
<button class="new-chat-btn" onclick="clearAllPanels()">+ 清空全部</button>
<div style="flex:1;overflow-y:auto" id="history-list"></div>
</div>
</nav>
<div class="main">
<div class="header">
<h1><span class="dot"></span>Agency</h1>
<div class="header-actions">
<span style="font-size:10px;color:var(--muted)" id="summary"></span>
<button class="btn" id="dashboardBtn" onclick="toggleDashboard()">📊</button>
<button class="btn" id="devBtn" onclick="toggleDevOverlay()">🔧</button>
<button class="btn" id="orchBtn" onclick="toggleOrchMode()">🧠</button>
<button class="btn" id="gridBtn" onclick="cycleGrid()">⊞</button>
<button class="btn" onclick="addPanel()">＋</button>
</div>
</div>
<div class="page-bar" id="pageBar" style="display:none">
<button id="pgPrev" onclick="prevPage()">◀</button>
<span style="min-width:60px;text-align:center" id="pgNum"></span>
<button id="pgNext" onclick="nextPage()">▶</button>
</div>
<div class="grid g1" id="grid"></div>
<!-- Harness 仪表盘覆盖层 -->
<div class="harness-overlay" id="harnessOverlay">
<div class="harness-overlay-tabs" id="harnessTabs">
<div class="harness-overlay-tab active" data-htab="overview">概览</div>
<div class="harness-overlay-tab" data-htab="permission">权限</div>
<div class="harness-overlay-tab" data-htab="subagents">SubAgent</div>
<div class="harness-overlay-tab" data-htab="hooks">Hooks</div>
<div class="harness-overlay-tab" data-htab="mcp">MCP</div>
<button class="btn" style="font-size:10px" onclick="toggleMiniDashboard()">📌</button>
<button class="btn" style="align-self:center" onclick="toggleDashboard()">✕</button>
</div>
<div class="harness-overlay-content" id="harnessContent"></div>
<div class="resize-handle"></div>
</div>
<!-- 设置覆盖层 -->
<div class="harness-overlay" id="devOverlay">
<div class="harness-overlay-tabs">
<span style="font-weight:600;color:var(--accent);padding:10px 0">⚙ 设置</span>
<button class="btn" style="font-size:10px" onclick="toggleMiniOverlay('devOverlay')">📌</button>
<button class="btn" style="align-self:center" onclick="toggleDevOverlay()">✕</button>
</div>
<div class="harness-overlay-content">
<div class="settings-section">
<h3 style="font-size:12px;color:var(--text);margin-bottom:8px">🔑 API Key</h3>
<p style="font-size:10px;color:var(--muted);margin-bottom:6px">支持 DeepSeek / Anthropic / OpenAI 兼容</p>
<input class="proj-input" id="api-key" type="password" placeholder="sk-…" autocomplete="off" style="width:100%">
<select class="proj-input" id="api-provider" style="width:100%;margin:4px 0">
<option value="deepseek">DeepSeek</option>
<option value="anthropic">Anthropic</option>
<option value="openai">OpenAI 兼容</option>
</select>
<button class="new-chat-btn" style="margin-bottom:4px;font-size:11px;padding:6px" onclick="saveApiKey()">💾 保存</button>
<span id="api-status" style="font-size:10px;color:var(--accent)"></span>
</div>
<div class="settings-section" style="margin-top:16px">
<h3 style="font-size:12px;color:var(--text);margin-bottom:8px">🤖 Agent 工厂</h3>
<textarea id="agent-factory-input" placeholder="描述你需要的 Agent…" rows="2" style="width:100%;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:11px;outline:none;resize:vertical;min-height:40px;font-family:inherit"></textarea>
<button class="new-chat-btn" onclick="generateAgent()" style="margin-top:6px;font-size:11px;padding:6px">生成 Agent</button>
<div id="agent-factory-output"></div>
</div>
<div class="settings-section" style="margin-top:16px">
<h3 style="font-size:12px;color:var(--text);margin-bottom:8px">🧩 Skills</h3>
<div id="skills-list" style="font-size:11px;color:var(--muted)">加载中…</div>
</div>
<div class="settings-section" style="margin-top:16px">
<h3 style="font-size:12px;color:var(--text);margin-bottom:8px">📝 记忆</h3>
<div id="mem-list" style="font-size:11px;color:var(--muted)">加载中…</div>
<div id="mem-editor" style="margin-top:8px"></div>
</div>
<div class="resize-handle"></div>
</div>
</div>
</div>
<script>
var panels=[],pidSeq=0,perPage=1,curPage=0,focusedPid=null,dragPid=null,orchMode=!1,devMode=!1;
var conversations=JSON.parse(localStorage.getItem('agency_convos')||'[]'),agents=[];
var projDir=localStorage.getItem('agency_proj_dir')||'';
var apiKey=localStorage.getItem('agency_api_key')||'';
var apiProvider=localStorage.getItem('agency_api_provider')||'deepseek';
if(apiKey){var ak=$('api-key');if(ak)ak.value=apiKey;var ap=$('api-provider');if(ap)ap.value=apiProvider;$('api-status').textContent='已配置'}
function saveApiKey(){apiKey=$('api-key').value.trim();apiProvider=$('api-provider').value;localStorage.setItem('agency_api_key',apiKey);localStorage.setItem('agency_api_provider',apiProvider);$('api-status').textContent=apiKey?'已保存':'已清除';if(!apiKey){localStorage.removeItem('agency_api_key');localStorage.removeItem('agency_api_provider')}}
function $(id){return document.getElementById(id)}
var grid=$('grid'),pageBar=$('pageBar'),agentList=$('agent-list'),historyList=$('history-list');
document.querySelectorAll('.sidebar-tab').forEach(function(tab){tab.addEventListener('click',function(){document.querySelectorAll('.sidebar-tab').forEach(function(t){t.classList.remove('active')});document.querySelectorAll('.sidebar-panel').forEach(function(p){p.classList.remove('active')});tab.classList.add('active');var p=$('panel-'+tab.dataset.tab);if(p)p.classList.add('active');})});
async function loadAgents(){try{agents=await(await fetch('/api/agents')).json();renderAgents(agents)}catch(e){agentList.innerHTML='<div style="color:var(--muted);font-size:12px;padding:8px">加载失败</div>'}}
loadAgents();
function renderAgents(list){agentList.innerHTML=list.map(function(a){return'<div class="agent-card" onclick="pickAgent(\''+a.name+'\')" oncontextmenu="pickAgentNew(\''+a.name+'\',event)"><div class="name">'+a.name+'<span class="model">'+(a.model||'auto')+'</span></div><div class="desc">'+escHtml(a.description||'')+'</div>'+(a.keywords&&a.keywords.length?'<div class="kw">'+a.keywords.slice(0,5).join(', ')+'</div>':'')+'</div>'}).join('')}
$('agent-search').addEventListener('input',function(){var q=$('agent-search').value.toLowerCase();renderAgents(agents.filter(function(a){return a.name.includes(q)||(a.description||'').includes(q)||(a.keywords||[]).some(function(k){return k.includes(q)})}))});
function pickAgent(name){var p=getFocusedPanel();p.dom.input.value='@'+name+' ';p.dom.input.focus()}
function pickAgentNew(name,e){e.preventDefault();var p=addPanel();p.dom.input.value='@'+name+' ';p.dom.input.focus()}
function getFocusedPanel(){if(focusedPid){var p=panels.find(function(x){return x.id===focusedPid});if(p&&p.dom.wrapper.classList.contains('on'))return p}var start=curPage*perPage;return panels[start]||panels[0]}
var pInput=$('proj-dir');if(pInput)pInput.value=projDir;
pInput&&pInput.addEventListener('change',function(){projDir=pInput.value.trim();localStorage.setItem('agency_proj_dir',projDir)});
function mkPanel(){return{id:++pidSeq,isStreaming:!1,abortController:null,currentConvo:{id:Date.now(),title:'',messages:[],sessionId:''},currentAssistantMsg:null,dom:{}}}

function showPermToast(data){
  var t=document.createElement('div');t.className='toast warn';
  var riskLabel=data.risk&&data.risk.level==='high'?'🔴 高风险':'🟡 中风险';
  t.innerHTML='<div><strong>'+riskLabel+'</strong> · '+escHtml(data.tool_name)+'</div><div style="font-size:10px;color:var(--muted);margin-top:2px">'+escHtml((data.tool_input||'').slice(0,100))+'</div><div class="toast-acts"><button class="allow">允许</button><button class="deny">拒绝</button><button class="always">总是允许此模式</button></div>';
  document.body.appendChild(t);
  t.querySelector('.allow').onclick=function(){sendPermDecision(data,'allow');t.remove()};
  t.querySelector('.deny').onclick=function(){sendPermDecision(data,'deny');t.remove()};
  t.querySelector('.always').onclick=function(){addAllowRule(data);sendPermDecision(data,'allow');t.remove()};
  setTimeout(function(){if(document.body.contains(t)){sendPermDecision(data,'deny');t.remove()}},30000);
}
function sendPermDecision(data,decision){
  fetch('/api/permissions/decision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tool_name:data.tool_name,decision:decision,risk:data.risk||{},reason:decision})});
}
function addAllowRule(data){
  fetch('/api/permissions/allowlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rule:data.tool_name})});
  showToast('已添加规则: '+data.tool_name);
}
function loadPermHistory(){
  fetch('/api/permissions/history?limit=100').then(function(r){return r.json()}).then(function(d){
    var el=$('hperm-log');if(!el)return;
    if(d.history&&d.history.length){el.innerHTML=d.history.map(function(e){return'<div class="perm-item '+e.decision+'"><span class="pdec">'+(e.decision==='allow'?'✓':e.decision==='deny'?'✗':'⚠')+'</span> '+escHtml(e.tool||'?')+' <span style="color:var(--muted);font-size:9px">'+e.time+(e.reason?' · '+escHtml(e.reason):'')+'</span></div>'}).join('')}else{el.innerHTML='暂无权限记录'}
  }).catch(function(){var el=$('hperm-log');if(el)el.innerHTML='加载失败'});
}

// 上下文工程
// ═══════════════════════════════════════
function loadContextDetail(){
  fetch('/api/harness/context').then(function(r){return r.json()}).then(function(d){
    var pct=d.total_tokens>0?Math.min(100,Math.round(d.total_tokens/300000*100)):0;
    var fill=$('hctx-fill'),text=$('hctx-text'),cache=$('hctx-cache'),detail=$('hctx-detail');
    if(fill){fill.style.width=pct+'%';fill.className='ctx-gauge-fill'+(pct>85?' danger':pct>60?' warn':'')}
    if(text)text.textContent=(d.total_tokens||0).toLocaleString()+' / 300K ('+pct+'%)';
    if(cache)cache.textContent='缓存命中: '+((d.cache_hit||0)>0?'✓ '+d.cache_hit:'—');
    if(detail)detail.innerHTML='输入: '+(d.input_tokens||0).toLocaleString()+' · 输出: '+(d.output_tokens||0).toLocaleString()+(d.last_update?' · '+d.last_update:'');
    // 也更新侧边栏
    var sf=$('ctx-gauge-fill'),st=$('ctx-gauge-text'),sd=$('ctx-detail');
    if(sf){sf.style.width=pct+'%';sf.className='ctx-gauge-fill'+(pct>85?' danger':pct>60?' warn':'')}
    if(st)st.textContent=(d.total_tokens||0).toLocaleString()+' / 300K';
    if(sd)sd.innerHTML='输入: '+(d.input_tokens||0).toLocaleString()+' · 输出: '+(d.output_tokens||0).toLocaleString();
  }).catch(function(){var el=$('hctx-detail');if(el)el.innerHTML='加载失败'});
}

function loadMemoryFiles(){
  fetch('/api/memory').then(function(r){return r.json()}).then(function(d){
    var el=$('hmem-list');if(!el)return;
    var files=d.files||[];
    if(files.length){el.innerHTML=files.map(function(f){return'<div class="mem-file" onclick="openMemEditor(\''+escHtml(f.path)+'\',\''+escHtml(f.name)+'\')"><span class="icon">📄</span><span>'+escHtml(f.name)+'</span><span style="color:var(--muted);font-size:10px;margin-left:auto">'+(f.size||0)+'B</span></div>'}).join('')}else{el.innerHTML='暂无记忆文件'}
  }).catch(function(){var el=$('hmem-list');if(el)el.innerHTML='加载失败'});
}
function openMemEditor(path,name){
  var fname=name.split('\\').pop().split('/').pop();
  fetch('/api/memory/'+encodeURIComponent(fname)).then(function(r){return r.json()}).then(function(d){
    if(d.error){showToast(d.error,!0);return}
    var ed=$('mem-editor');
    ed.innerHTML='<div style="margin-bottom:4px;font-size:11px;color:var(--text2)">编辑: '+escHtml(d.name)+'</div><textarea class="mem-editor" id="mem-edit-area">'+escHtml(d.content)+'</textarea><div style="margin-top:6px;display:flex;gap:6px"><button class="btn" onclick="saveMemFile(\''+escHtml(fname)+'\')">💾 保存</button><button class="btn" onclick="document.getElementById(\'mem-editor\').innerHTML=\'\';loadMemList()">取消</button></div>';
  }).catch(function(){showToast('加载文件失败',!0)});
}
function saveMemFile(name){
  var content=document.getElementById('mem-edit-area');if(!content)return;
  fetch('/api/memory/'+encodeURIComponent(name),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:content.value})}).then(function(r){return r.json()}).then(function(d){if(d.ok){showToast('已保存: '+d.name);document.getElementById('mem-editor').innerHTML='';loadMemList()}else{showToast(d.error||'保存失败',!0)}});
}

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
// 升级版 Markdown 渲染 — 覆盖原函数，支持代码高亮+思考折叠+链接
var _origRenderMD=renderMD;
renderMD=function(t){
  if(!t)return'';
  var h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/\[Thinking\]([\s\S]*?)\[\/Thinking\]/gi,'<details class="think"><summary>思考过程</summary>$1</details>');
  var cb=[];
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,function(m,lang,code){
    var i=cb.length,c=code.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
    cb.push({l:lang||'',c:c});return'%%CB'+i+'%%';
  });
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/^- (.+)$/gm,'<li style="margin-left:16px">$1</li>');
  h=h.replace(/\n/g,'<br>');
  for(var i=0;i<cb.length;i++){
    var b=cb[i],hl='';
    try{hl=hljs?hljs.highlight(b.c,{language:b.l}).value:hljs.highlightAuto(b.c).value}catch(e){hl=b.c}
    h=h.replace('%%CB'+i+'%%','<pre><code class="hljs">'+hl+'</code></pre>');
  }
  return h;
};
</script>
