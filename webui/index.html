<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--surface:#0f1520;--surface2:#161d2b;--text:#e6e8ed;--text2:#9ca3b4;--muted:#5f6877;--accent:#22d3a0;--danger:#f87171;--warn:#fbbf20;--border:#1e293b;--radius:10px;--radius-sm:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.55 "DM Sans","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
.sidebar{width:280px;min-width:280px;background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border)}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.sidebar-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sidebar-panel{flex:1;overflow-y:auto;display:none;padding:8px}
.sidebar-panel.active{display:flex;flex-direction:column}
.agent-card{background:var(--surface2);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.agent-card:hover{border-color:var(--accent);background:rgba(34,211,160,.06)}
.agent-card .name{font-weight:600;font-size:13px;color:#fff}
.agent-card .model{font-size:10px;background:var(--accent);color:#000;padding:1px 6px;border-radius:4px;margin-left:6px}
.agent-card .desc{font-size:11px;color:var(--text2);margin-top:3px}
.agent-card .kw{font-size:10px;color:var(--muted);margin-top:2px;opacity:.7}
.new-chat-btn{width:100%;padding:8px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;margin-bottom:8px;flex-shrink:0;font-weight:600}
.history-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px;margin-bottom:2px;transition:background .15s;position:relative}
.history-item:hover{background:rgba(255,255,255,.04)}
.history-item:hover .del-btn{opacity:1}
.history-item .time{font-size:10px;color:var(--muted)}
.history-item .preview{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.del-btn{opacity:0;background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;transition:opacity .15s;position:absolute;right:6px;top:50%;transform:translateY(-50%)}
.del-btn:hover{color:#f00}
.agent-search{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none;margin-bottom:8px;flex-shrink:0}
.agent-search:focus{border-color:var(--accent)}
.agent-list{flex:1;overflow-y:auto}
.proj-label{font-size:12px;color:var(--text);display:block;margin-bottom:4px;font-weight:600}
.proj-hint{font-size:10px;color:var(--muted);margin-bottom:8px}
.proj-input{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;outline:none;font-family:"JetBrains Mono",monospace;margin-bottom:8px}
.proj-input:focus{border-color:var(--accent)}
.proj-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.proj-btn:hover{border-color:var(--danger);color:var(--danger)}

.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.header h1{font-size:15px;color:var(--accent);display:flex;align-items:center;gap:8px}
.header h1 .dot{width:7px;height:7px;background:var(--accent);border-radius:50%}
.header-actions{display:flex;gap:5px;align-items:center}
.page-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:4px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;font-size:11px;color:var(--muted)}
.page-bar button{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.page-bar button:hover{border-color:var(--accent)}
.page-bar button:disabled{opacity:.3}
.grid{flex:1;display:grid;gap:0;overflow:hidden;min-height:0}
.grid.g1{grid-template-columns:1fr}
.grid.g2{grid-template-columns:1fr 1fr}
.grid.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.panel{display:none;flex-direction:column;overflow:hidden;min-height:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.panel.on{display:flex}
.panel:nth-child(even){border-right:none}
.panel-bar{display:flex;align-items:center;justify-content:space-between;padding:2px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;cursor:grab}
.panel-bar .pinfo{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.panel-bar .pdot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.panel-bar .pdot.busy{background:var(--warn);animation:pulse 1s infinite}
.panel-bar .pclose{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 2px;line-height:1}
.panel-bar .pclose:hover{color:var(--danger)}
.panel-msgs{flex:1;overflow-y:auto;padding:8px 10px;min-height:0}
.panel-route{padding:2px 8px;font-size:9px;color:var(--muted);flex-shrink:0;display:flex;gap:4px;flex-wrap:wrap;background:var(--surface);min-height:18px}
.panel-route span{background:var(--surface2);padding:1px 5px;border-radius:3px;white-space:nowrap}
.panel-inp{display:flex;gap:5px;padding:6px 8px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.panel-inp textarea{flex:1;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;outline:none;resize:none;min-height:34px;max-height:100px;font-family:inherit;line-height:1.4}
.panel-inp textarea:focus{border-color:var(--accent)}
.panel-inp button{padding:6px 12px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;align-self:flex-end;min-width:48px}
.panel-inp button.stopping{background:var(--danger);color:#fff;animation:pulse 1s infinite}
.panel.dragging{opacity:.35}
.panel.drag-over{box-shadow:inset 0 0 0 2px var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.msg{max-width:88%;margin-bottom:7px;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0;transform:translateY(2px)}}
.msg.user{margin-left:auto}
.msg.user .bubble{background:var(--accent);color:#000;border-radius:var(--radius) var(--radius) 3px var(--radius);padding:6px 9px;font-size:12px}
.msg.assistant .bubble{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius) var(--radius) var(--radius) 3px;padding:6px 9px;font-size:12px}
.msg-label{font-size:9px;color:var(--muted);margin-bottom:2px;padding:0 2px}
.msg.user .msg-label{text-align:right}
.msg pre{background:#0d1117;color:#7ee787;padding:8px 10px;border-radius:5px;overflow-x:auto;margin:4px 0;font:11px "JetBrains Mono",monospace}
.msg code{font:11px "JetBrains Mono",monospace;background:rgba(255,255,255,.08);padding:1px 3px;border-radius:2px}
.msg pre code{background:none;padding:0}
.cursor{display:inline-block;width:6px;height:13px;background:var(--accent);animation:blink .5s infinite;vertical-align:text-bottom;margin-left:1px;border-radius:1px}
@keyframes blink{50%{opacity:0}}
.empty-panel{text-align:center;color:var(--muted);margin-top:3vh}
.empty-panel .logo{font-size:22px;margin-bottom:3px}
.empty-panel h3{font-size:12px;margin-bottom:2px;color:#fff}
.toast{position:fixed;top:12px;right:12px;background:var(--surface2);border:1px solid var(--border);padding:8px 14px;border-radius:var(--radius);font-size:12px;z-index:99;animation:fadeIn .2s;max-width:280px}
.toast.error{border-color:var(--danger)}
.btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:5px;cursor:pointer;font-size:11px;white-space:nowrap;transition:all .15s}
.btn:hover{border-color:var(--accent)}
.btn.on{background:var(--accent);border-color:var(--accent);color:#000}
.tools-section{margin-bottom:12px}
.tools-section h3{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.tools-section textarea{width:100%;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:11px;outline:none;resize:vertical;min-height:40px;font-family:inherit}
.tools-section textarea:focus{border-color:var(--accent)}
.cost-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;color:var(--muted)}
.cost-row .val{color:var(--text);font-weight:500}
.cost-bar{height:3px;background:var(--border);border-radius:2px;margin:2px 0 6px;overflow:hidden}
.cost-bar-fill{height:100%;background:var(--accent);border-radius:2px}
.cost-kpis{display:flex;gap:6px;margin-bottom:8px}
.cost-kpi{flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:6px;text-align:center}
.kpi-val{display:block;font-size:14px;font-weight:700;color:var(--accent)}
.kpi-label{display:block;font-size:9px;color:var(--muted);margin-top:1px}
</style>
</head>
<body>
<nav class="sidebar">
<div class="sidebar-tabs">
<div class="sidebar-tab active" data-tab="agents">Agent</div>
<div class="sidebar-tab" data-tab="project">项目</div>
<div class="sidebar-tab" data-tab="history">历史</div>
<div class="sidebar-tab" data-tab="tools" style="display:none">工具</div>
</div>
<div class="sidebar-panel active" id="panel-agents">
<input class="agent-search" id="agent-search" placeholder="搜索 Agent…" autocomplete="off">
<div class="agent-list" id="agent-list"></div>
</div>
<div class="sidebar-panel" id="panel-project">
<div style="padding:4px 0">
<label class="proj-label">📁 工作目录</label>
<p class="proj-hint">Agent 优先在此目录下工作</p>
<input class="proj-input" id="proj-dir" placeholder="例: D:\ai">
<div style="margin-top:6px"><button class="proj-btn" onclick="projDir='';document.getElementById('proj-dir').value='';localStorage.removeItem('agency_proj_dir')">清除</button></div>
</div>
</div>
<div class="sidebar-panel" id="panel-tools">
<div class="tools-section"><h3>💰 费用看板</h3><div id="cost-overview">加载中…</div></div>
<div class="tools-section"><h3>🤖 Agent 工厂</h3><textarea id="agent-factory-input" placeholder="描述你需要的 Agent…" rows="2"></textarea><button class="new-chat-btn" onclick="generateAgent()" style="margin-top:6px">生成 Agent</button><div id="agent-factory-output"></div></div>
</div>
<div class="sidebar-panel" id="panel-history">
<button class="new-chat-btn" onclick="clearAllPanels()">+ 清空全部</button>
<div style="flex:1;overflow-y:auto" id="history-list"></div>
</div>
</nav>
<div class="main">
<div class="header">
<h1><span class="dot"></span>Agency</h1>
<div class="header-actions">
<span style="font-size:10px;color:var(--muted)" id="summary"></span>
<button class="btn" id="devBtn" onclick="toggleDevMode()">🔧 开发</button>
<button class="btn" id="orchBtn" onclick="toggleOrchMode()">🧠 调度</button>
<button class="btn" id="gridBtn" onclick="cycleGrid()">⊞ 1窗</button>
<button class="btn" onclick="addPanel()">＋</button>
<button class="btn" onclick="clearAllPanels()">清空</button>
</div>
</div>
<div class="page-bar" id="pageBar" style="display:none">
<button id="pgPrev" onclick="prevPage()">◀</button>
<span style="min-width:60px;text-align:center" id="pgNum"></span>
<button id="pgNext" onclick="nextPage()">▶</button>
</div>
<div class="grid g1" id="grid"></div>
</div>
<script>
var panels=[],pidSeq=0,perPage=1,curPage=0,focusedPid=null,dragPid=null,orchMode=!1,devMode=!1;
var conversations=JSON.parse(localStorage.getItem('agency_convos')||'[]'),agents=[];
var projDir=localStorage.getItem('agency_proj_dir')||'';
function $(id){return document.getElementById(id)}
var grid=$('grid'),pageBar=$('pageBar'),agentList=$('agent-list'),historyList=$('history-list');
document.querySelectorAll('.sidebar-tab').forEach(function(tab){tab.addEventListener('click',function(){document.querySelectorAll('.sidebar-tab').forEach(function(t){t.classList.remove('active')});document.querySelectorAll('.sidebar-panel').forEach(function(p){p.classList.remove('active')});tab.classList.add('active');var p=$('panel-'+tab.dataset.tab);if(p)p.classList.add('active');if(tab.dataset.tab==='tools'&&devMode)loadCostData()})});
async function loadAgents(){try{agents=await(await fetch('/api/agents')).json();renderAgents(agents)}catch(e){agentList.innerHTML='<div style="color:var(--muted);font-size:12px;padding:8px">加载失败</div>'}}
loadAgents();
function renderAgents(list){agentList.innerHTML=list.map(function(a){return'<div class="agent-card" onclick="pickAgent(\''+a.name+'\')" oncontextmenu="pickAgentNew(\''+a.name+'\',event)"><div class="name">'+a.name+'<span class="model">'+(a.model||'auto')+'</span></div><div class="desc">'+escHtml(a.description||'')+'</div>'+(a.keywords&&a.keywords.length?'<div class="kw">'+a.keywords.slice(0,5).join(', ')+'</div>':'')+'</div>'}).join('')}
$('agent-search').addEventListener('input',function(){var q=$('agent-search').value.toLowerCase();renderAgents(agents.filter(function(a){return a.name.includes(q)||(a.description||'').includes(q)||(a.keywords||[]).some(function(k){return k.includes(q)})}))});
function pickAgent(name){var p=getFocusedPanel();p.dom.input.value='@'+name+' ';p.dom.input.focus()}
function pickAgentNew(name,e){e.preventDefault();var p=addPanel();p.dom.input.value='@'+name+' ';p.dom.input.focus()}
function getFocusedPanel(){if(focusedPid){var p=panels.find(function(x){return x.id===focusedPid});if(p&&p.dom.wrapper.classList.contains('on'))return p}var start=curPage*perPage;return panels[start]||panels[0]}
var pInput=$('proj-dir');if(pInput)pInput.value=projDir;
pInput&&pInput.addEventListener('change',function(){projDir=pInput.value.trim();localStorage.setItem('agency_proj_dir',projDir)});
function mkPanel(){return{id:++pidSeq,isStreaming:!1,abortController:null,currentConvo:{id:Date.now(),title:'',messages:[]},currentAssistantMsg:null,dom:{}}}
function addPanel(){var s=mkPanel();panels.push(s);buildPanelDOM(s);curPage=Math.floor((panels.length-1)/perPage);refreshUI();setTimeout(function(){s.dom.input&&s.dom.input.focus()},80);return s}
function removePanel(pid){if(panels.length<=1)return;var idx=panels.findIndex(function(p){return p.id===pid});if(idx<0)return;var p=panels[idx];if(p.isStreaming&&p.abortController)p.abortController.abort();panels.splice(idx,1);p.dom.wrapper.remove();if(focusedPid===pid)focusedPid=null;var total=Math.ceil(panels.length/perPage);if(curPage>=total)curPage=Math.max(0,total-1);refreshUI()}
function clearAllPanels(){panels.forEach(function(p){if(p.isStreaming&&p.abortController)p.abortController.abort()});while(panels.length>1){var p=panels.pop();p.dom.wrapper&&p.dom.wrapper.remove()}var p=panels[0];p.currentConvo={id:Date.now(),title:'',messages:[]};p.dom.messages.innerHTML='<div class="empty-panel"><div class="logo">⚡</div><h3>就绪</h3></div>';p.dom.route.innerHTML='';p.dom.agentName.textContent='就绪';curPage=0;refreshUI()}
function buildPanelDOM(s){var w=document.createElement('div');w.className='panel on';w.draggable=!0;w.innerHTML='<div class="panel-bar"><span class="pinfo"><span class="pdot"></span><span class="pagent">就绪</span></span><button class="pclose">✕</button></div><div class="panel-msgs"><div class="empty-panel"><div class="logo">⚡</div><h3>就绪</h3></div></div><div class="panel-route"></div><div class="panel-inp"><textarea placeholder="输入任务或 @agent名…" rows="1"></textarea><button>发送</button></div>';grid.appendChild(w);s.dom={wrapper:w,messages:w.querySelector('.panel-msgs'),route:w.querySelector('.panel-route'),input:w.querySelector('textarea'),sendBtn:w.querySelector('.panel-inp button'),dot:w.querySelector('.pdot'),agentName:w.querySelector('.pagent'),empty:w.querySelector('.empty-panel')};w.querySelector('.pclose').addEventListener('click',function(e){e.stopPropagation();removePanel(s.id)});s.dom.input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend(s.id)}});s.dom.input.addEventListener('focus',function(){focusedPid=s.id});s.dom.input.addEventListener('input',function(){s.dom.input.style.height='auto';s.dom.input.style.height=Math.min(s.dom.input.scrollHeight,100)+'px'});s.dom.sendBtn.addEventListener('click',function(){handleSend(s.id)});w.addEventListener('dragstart',function(e){dragPid=s.id;w.classList.add('dragging');e.dataTransfer.effectAllowed='move'});w.addEventListener('dragend',function(){w.classList.remove('dragging');dragPid=null;document.querySelectorAll('.panel.drag-over').forEach(function(el){el.classList.remove('drag-over')})});w.addEventListener('dragover',function(e){e.preventDefault();if(dragPid&&dragPid!==s.id)w.classList.add('drag-over')});w.addEventListener('dragleave',function(){w.classList.remove('drag-over')});w.addEventListener('drop',function(e){e.preventDefault();w.classList.remove('drag-over');if(!dragPid||dragPid===s.id)return;var si=panels.findIndex(function(p){return p.id===dragPid}),di=panels.findIndex(function(p){return p.id===s.id});if(si<0||di<0)return;var tmp=panels[si];panels[si]=panels[di];panels[di]=tmp;rebuildAllDOM();dragPid=null})}
function rebuildAllDOM(){panels.forEach(function(p){p.dom.wrapper&&p.dom.wrapper.remove()});panels.forEach(function(p){buildPanelDOM(p)});refreshUI()}
function cycleGrid(){var s=[1,2,4];perPage=s[(s.indexOf(perPage)+1)%3];curPage=0;refreshUI()}
function prevPage(){if(curPage>0){curPage--;refreshUI()}}
function nextPage(){if(curPage<Math.ceil(panels.length/perPage)-1){curPage++;refreshUI()}}
function refreshUI(){var total=Math.ceil(panels.length/perPage),start=curPage*perPage;grid.className='grid g'+perPage;$('gridBtn').textContent={1:'⊞ 1窗',2:'⊞ 2窗',4:'⊞ 4窗'}[perPage]||'⊞';if(total>1){pageBar.style.display='flex';$('pgNum').textContent=(curPage+1)+'/'+total;$('pgPrev').disabled=curPage<=0;$('pgNext').disabled=curPage>=total-1}else{pageBar.style.display='none'}panels.forEach(function(p,i){p.dom.wrapper.classList.toggle('on',i>=start&&i<start+perPage)});$('summary').textContent=panels.length+'窗'+(total>1?' '+(curPage+1)+'/'+total:'')}
function handleSend(pid){var p=panels.find(function(x){return x.id===pid});if(!p)return;if(p.isStreaming){stopStream(pid);return}if(orchMode){handleOrchSend(p);return}var task=p.dom.input.value.trim();if(!task)return;var isFirst=p.currentConvo.messages.length===0;var forceAgent='',actualTask=task;var m=task.match(/^@(\S+)\s+/);if(m){forceAgent=m[1];actualTask=task.slice(m[0].length)}setStreaming(p,!0);p.dom.input.value='';p.dom.input.style.height='auto';p.dom.route.innerHTML='<span>…</span>';p.dom.agentName.textContent='…';if(p.dom.empty)p.dom.empty.style.display='none';addMsg(p,'user',task);p.currentConvo.messages.push({role:'user',content:task});p.currentAssistantMsg=addMsg(p,'assistant','<span class="cursor"></span>');p.abortController=new AbortController();fetch('/api/route',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:actualTask,force_agent:forceAgent,proj_dir:projDir||undefined}),signal:p.abortController.signal}).then(function(r){return r.json()}).then(function(route){if(route.error)throw new Error(route.error);p.dom.route.innerHTML='<span>🤖 '+route.agent+'</span><span>🧠 '+route.model+'</span>';p.dom.agentName.textContent=route.agent;var c=p.currentAssistantMsg.querySelector('.cursor');if(c)c.remove();return fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:actualTask,force_agent:forceAgent,model:route.model,proj_dir:projDir||undefined,is_first_message:isFirst}),signal:p.abortController.signal})}).then(function(resp){var reader=resp.body.getReader(),decoder=new TextDecoder(),buf='',txt='';function read(){reader.read().then(function(result){if(result.done){finish();return}buf+=decoder.decode(result.value,{stream:!0});var lines=buf.split('\n');buf=lines.pop()||'';for(var i=0;i<lines.length;i++){var line=lines[i];if(line.indexOf('event:')===0)continue;if(line.indexOf('data: ')!==0)continue;try{var d=JSON.parse(line.slice(6));if(d.content){txt+=d.content;p.currentAssistantMsg.innerHTML=renderMD(txt)+'<span class="cursor"></span>';p.dom.messages.scrollTop=p.dom.messages.scrollHeight}else if(d.elapsed){p.dom.route.innerHTML+='<span>⏱ '+d.elapsed+'s</span><span>💰 $'+d.cost+'</span>'}else if(d.error){p.currentAssistantMsg.innerHTML='<span style="color:var(--danger)">❌ '+escHtml(d.error)+'</span>'}}catch(_){}}read()})}function finish(){var c=p.currentAssistantMsg.querySelector('.cursor');if(c)c.remove();p.currentConvo.messages.push({role:'assistant',content:txt});saveAllConvos();setStreaming(p,!1);p.dom.agentName.textContent='就绪'}read()}).catch(function(e){if(e.name==='AbortError'){var c=p.currentAssistantMsg.querySelector('.cursor');if(c)c.remove();p.currentAssistantMsg.innerHTML+=' <span style="color:var(--warn)">⏹ 已停止</span>';var partial=(p.currentAssistantMsg.textContent||'').replace('⏹ 已停止','').trim();if(partial){p.currentConvo.messages.push({role:'assistant',content:partial});saveAllConvos()}}else{if(p.currentAssistantMsg)p.currentAssistantMsg.innerHTML='<span style="color:var(--danger)">❌ '+escHtml(e.message)+'</span>'}setStreaming(p,!1);p.dom.agentName.textContent='就绪'})}
function handleOrchSend(p){var task=p.dom.input.value.trim();if(!task)return;setStreaming(p,!0);p.dom.input.value='';p.dom.input.style.height='auto';p.dom.route.innerHTML='<span>🧠 智能调度</span>';if(p.dom.empty)p.dom.empty.style.display='none';addMsg(p,'user',task);p.currentConvo.messages.push({role:'user',content:task});p.currentAssistantMsg=addMsg(p,'assistant','<span class="cursor"></span>');p.abortController=new AbortController();fetch('/api/orchestrate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:task,proj_dir:projDir||undefined}),signal:p.abortController.signal}).then(function(resp){var reader=resp.body.getReader(),decoder=new TextDecoder(),buf='',txt='';function read(){reader.read().then(function(result){if(result.done){finish();return}buf+=decoder.decode(result.value,{stream:!0});var lines=buf.split('\n');buf=lines.pop()||'';for(var i=0;i<lines.length;i++){var line=lines[i];if(line.indexOf('event:')===0)continue;if(line.indexOf('data: ')!==0)continue;try{var d=JSON.parse(line.slice(6));if(d.content){txt+=d.content;p.currentAssistantMsg.innerHTML=renderMD(txt)+'<span class="cursor"></span>';p.dom.messages.scrollTop=p.dom.messages.scrollHeight}}catch(_){}}read()})}function finish(){var c=p.currentAssistantMsg.querySelector('.cursor');if(c)c.remove();p.currentConvo.messages.push({role:'assistant',content:txt||'调度完成'});saveAllConvos();setStreaming(p,!1)}read()}).catch(function(e){if(e.name==='AbortError'){var c=p.currentAssistantMsg.querySelector('.cursor');if(c)c.remove();p.currentAssistantMsg.innerHTML+=' <span style="color:var(--warn)">⏹ 已停止</span>'}else{if(p.currentAssistantMsg)p.currentAssistantMsg.innerHTML='<span style="color:var(--danger)">❌ '+escHtml(e.message)+'</span>'}setStreaming(p,!1)})}
function stopStream(pid){var p=panels.find(function(x){return x.id===pid});if(p&&p.abortController){p.abortController.abort();p.abortController=null}}
function setStreaming(p,v){p.isStreaming=v;p.dom.input.disabled=v;p.dom.sendBtn.textContent=v?'停止':'发送';if(v){p.dom.sendBtn.classList.add('stopping');if(p.dom.dot)p.dom.dot.classList.add('busy')}else{p.dom.sendBtn.classList.remove('stopping');if(p.dom.dot)p.dom.dot.classList.remove('busy');p.abortController=null}if(!v)setTimeout(function(){p.dom.input.focus();p.dom.input.disabled=!1},50)}
function addMsg(p,role,content){var w=document.createElement('div');w.className='msg '+role;w.innerHTML='<div class="msg-label">'+(role==='user'?'你':'Agency')+'</div><div class="bubble">'+content+'</div>';p.dom.messages.appendChild(w);p.dom.messages.scrollTop=p.dom.messages.scrollHeight;return w.querySelector('.bubble')}
function saveAllConvos(){panels.forEach(function(p){if(p.currentConvo.messages.length===0)return;if(!p.currentConvo.title||p.currentConvo.title==='新对话'){var f=p.currentConvo.messages.find(function(m){return m.role==='user'});if(f)p.currentConvo.title=f.content.slice(0,40)}var idx=conversations.findIndex(function(c){return c.id===p.currentConvo.id});if(idx>=0){conversations[idx]={id:p.currentConvo.id,title:p.currentConvo.title,messages:p.currentConvo.messages}}else{conversations.unshift({id:p.currentConvo.id,title:p.currentConvo.title,messages:p.currentConvo.messages})}});localStorage.setItem('agency_convos',JSON.stringify(conversations));renderHistory()}
function renderHistory(){historyList.innerHTML=conversations.slice(0,30).map(function(c){return'<div class="history-item" onclick="loadConvo(\''+c.id+'\')"><div style="display:flex;justify-content:space-between;align-items:center"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">'+escHtml(c.title||'新对话')+'</span><button class="del-btn" onclick="delConvo(\''+c.id+'\',event)">×</button></div><div class="time">'+new Date(c.id).toLocaleDateString('zh-CN')+'</div><div class="preview">'+escHtml((c.messages[0]&&c.messages[0].content||'').slice(0,30))+'</div></div>'}).join('')||'<div style="color:var(--muted);font-size:12px;padding:8px">暂无历史</div>'}
renderHistory();
function loadConvo(id){var c=conversations.find(function(x){return x.id===Number(id)});if(!c)return;var p=getFocusedPanel();p.currentConvo=c;p.dom.messages.innerHTML='';p.dom.route.innerHTML='';c.messages.forEach(function(m){addMsg(p,m.role,m.content)});p.dom.messages.scrollTop=p.dom.messages.scrollHeight}
function delConvo(id,e){e.stopPropagation();conversations=conversations.filter(function(c){return c.id!==Number(id)});localStorage.setItem('agency_convos',JSON.stringify(conversations));renderHistory()}
function toggleDevMode(){devMode=!devMode;var btn=$('devBtn');btn.classList.toggle('on',devMode);btn.textContent=devMode?'🔧 关闭':'🔧 开发';var t=document.querySelector('.sidebar-tab[data-tab="tools"]');if(t)t.style.display=devMode?'flex':'none';if(!devMode){var tp=$('panel-tools');if(tp&&tp.classList.contains('active')){var at=document.querySelector('.sidebar-tab[data-tab="agents"]');if(at)at.click()}}if(devMode)loadCostData()}
function loadCostData(){fetch('/api/cost?days=30').then(function(r){return r.json()}).then(function(d){var el=$('cost-overview');if(!d||!d.total){el.innerHTML='暂无数据';return}var t=d.total,td=d.today;var h='<div class="cost-kpis"><div class="cost-kpi"><span class="kpi-val">$'+(td.cost||0).toFixed(4)+'</span><span class="kpi-label">今日</span></div><div class="cost-kpi"><span class="kpi-val">$'+(t.cost||0).toFixed(4)+'</span><span class="kpi-label">30天</span></div><div class="cost-kpi"><span class="kpi-val">'+(t.calls||0)+'</span><span class="kpi-label">调用</span></div></div>';if(d.by_model&&d.by_model.length){var maxM=Math.max.apply(null,d.by_model.map(function(m){return m.cost}));h+='<div class="tools-section"><h3>按模型</h3>';d.by_model.forEach(function(m){h+='<div class="cost-row"><span>'+(m.model||'?')+'</span><span class="val">$'+m.cost.toFixed(4)+'</span></div><div class="cost-bar"><div class="cost-bar-fill" style="width:'+(m.cost/maxM*100)+'%"></div></div>'});h+='</div>'}if(d.by_agent&&d.by_agent.length){h+='<div class="tools-section"><h3>按 Agent</h3>';d.by_agent.forEach(function(m){h+='<div class="cost-row"><span>'+m.agent+'</span><span class="val">$'+m.cost.toFixed(4)+'</span></div>'});h+='</div>'}el.innerHTML=h}).catch(function(){$('cost-overview').innerHTML='加载失败'})}
function generateAgent(){var input=$('agent-factory-input'),output=$('agent-factory-output');var req=input.value.trim();if(!req)return;output.innerHTML='生成中…';fetch('/api/agent-generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({requirement:req})}).then(function(resp){var reader=resp.body.getReader(),decoder=new TextDecoder(),buf='',txt='';function read(){reader.read().then(function(result){if(result.done){finish();return}buf+=decoder.decode(result.value,{stream:!0});var lines=buf.split('\n');buf=lines.pop()||'';for(var i=0;i<lines.length;i++){if(lines[i].indexOf('data: ')!==0)continue;if(lines[i].indexOf('[DONE]')>=0){finish();return}try{var d=JSON.parse(lines[i].slice(6));if(d.content)txt+=d.content}catch(_){}}read()})}function finish(){output.innerHTML='<pre style="font-size:10px;max-height:200px;overflow:auto;background:var(--bg);padding:8px;border-radius:4px">'+escHtml(txt)+'</pre><button class="new-chat-btn" style="margin-top:4px" onclick="saveAgent()">保存此 Agent</button>';output._agentContent=txt}read()}).catch(function(){output.innerHTML='生成失败'})}
function saveAgent(){var txt=$('agent-factory-output')._agentContent;if(!txt)return;var m=txt.match(/name:\s*"?([a-z0-9-]+)"?/i);var name=m?m[1]:('agent-'+Date.now().toString(36));fetch('/api/agent-create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,content:txt})}).then(function(r){return r.json()}).then(function(d){if(d.ok){showToast('Agent 已保存: '+name);loadAgents()}else{showToast(d.error||'保存失败',!0)}}).catch(function(){showToast('保存失败',!0)})}
function toggleOrchMode(){orchMode=!orchMode;var btn=$('orchBtn');btn.classList.toggle('on',orchMode);btn.textContent=orchMode?'🧠 调度中':'🧠 调度';if(orchMode&&perPage<4){perPage=4;refreshUI()}}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){panels.forEach(function(p){if(p.isStreaming)stopStream(p.id)})}if(e.ctrlKey&&e.key==='n'){e.preventDefault();addPanel()}if(e.ctrlKey&&e.key==='ArrowLeft'){e.preventDefault();prevPage()}if(e.ctrlKey&&e.key==='ArrowRight'){e.preventDefault();nextPage()}if(e.ctrlKey&&e.key==='g'){e.preventDefault();cycleGrid()}});
function renderMD(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/^- (.+)$/gm,'<li>$1</li>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/\n/g,'<br>')}
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function showToast(m,err){var t=document.createElement('div');t.className='toast'+(err?' error':'');t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s'},2500);setTimeout(function(){t.remove()},3000)}
addPanel();
</script>
</body>
</html>
